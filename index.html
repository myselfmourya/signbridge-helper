<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignBridge</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="google_translate_element" style="position: absolute; opacity: 0; pointer-events: none; z-index: -1;"></div>
    
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,hi,te,ta',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script type="module" src="/src/main.tsx"></script>
    
    <style>
      /* Hide the annoying google translate top banner and body margin */
      .goog-te-banner-frame { display: none !important; }
      body { top: 0px !important; }
      /* Adjust the widget to look better inside sidebar */
      .goog-te-gadget { color: transparent !important; }
      .goog-te-gadget .goog-te-combo {
         width: 100%;
         padding: 0.5rem;
         border-radius: 8px;
         background-color: white;
         border: 1px solid #e2e8f0;
         color: #0f172a;
         font-family: inherit;
         font-size: 0.9rem;
      }
    </style>
  </body>
</html>
